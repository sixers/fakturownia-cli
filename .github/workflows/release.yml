name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install syft
        shell: bash
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Run GoReleaser
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_VERSION: v2.14.3
        run: |
          set -euo pipefail
          curl -sfL https://goreleaser.com/static/run | VERSION="${GORELEASER_VERSION}" bash -s -- release --clean
      - name: Build binary checksums
        shell: bash
        run: |
          set -euo pipefail
          rm -f dist/binary-checksums.txt
          while IFS= read -r -d '' file; do
            rel="${file#dist/}"
            sha256sum "$file" >> dist/binary-checksums.txt
          done < <(find dist -type f -name fakturownia -print0)
      - name: Upload binary checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/binary-checksums.txt --clobber
